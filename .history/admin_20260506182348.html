<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ORYX.OS | DJ Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg-dark: #050507;
  --panel-bg: #0c0c12;
  --neon-cyan: #00f0ff;
  --neon-purple: #7a5cff;
  --neon-gold: #ffd166;
  --border: rgba(255, 255, 255, 0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Montserrat', sans-serif;
  background-color: var(--bg-dark);
  color: white;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* SIDE NAVIGATION */
.sidebar {
  width: 220px;
  background: var(--panel-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 20px;
}

.brand-area { margin-bottom: 40px; }
.brand-area h2 { font-size: 18px; letter-spacing: 3px; font-weight: 800; }
.brand-area p { font-size: 8px; color: var(--neon-cyan); letter-spacing: 1px; }

.nav-link {
  color: rgba(255,255,255,0.4);
  text-decoration: none;
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 25px;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: 0.3s;
}

.nav-link.active { color: var(--neon-cyan); }

/* MAIN DASHBOARD */
.dashboard-content {
  flex-grow: 1;
  padding: 30px;
  overflow-y: auto;
  background: radial-gradient(circle at top right, rgba(0, 240, 255, 0.03), transparent);
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
}

/* STAT CARDS */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}

.stat-card {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  padding: 20px;
  border-radius: 12px;
}

.stat-card h4 { font-size: 10px; color: var(--neon-gold); margin-bottom: 10px; text-transform: uppercase; }
.stat-card div { font-size: 24px; font-weight: 800; }

/* PANEL GRID */
.panel-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 25px;
}

.section-panel {
  background: var(--panel-bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
}

.panel-title {
  font-size: 12px;
  font-weight: 800;
  color: var(--neon-cyan);
  margin-bottom: 20px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 10px;
  display: flex;
  justify-content: space-between;
}

/* REQUEST LISTS */
.request-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 12px;
}

.badge {
  font-size: 8px;
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 800;
}

.badge.vip { color: var(--neon-gold); border: 1px solid var(--neon-gold); }
.badge.free { color: var(--neon-cyan); border: 1px solid var(--neon-cyan); }

.action-btns button {
  padding: 8px 12px;
  border-radius: 6px;
  border: none;
  font-size: 10px;
  font-weight: 700;
  cursor: pointer;
}

.btn-approve { background: var(--neon-cyan); color: black; }
.btn-deny { background: transparent; color: rgba(255,255,255,0.3); border: 1px solid var(--border); }

/* AUTH OVERLAY */
#loginPanel {
  position: fixed; inset:0; background: var(--bg-dark); 
  display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
}
</style>
</head>
<body>

<div id="loginPanel">
  <h2 style="letter-spacing:5px; margin-bottom:20px;">ORYX.OS ADMIN</h2>
  <input type="password" id="pass" placeholder="Access Code" style="padding:15px; border-radius:10px; background:#111; border:1px solid var(--border); color:white; margin-bottom:10px;">
  <button onclick="checkAuth()" style="padding:10px 20px; background:var(--neon-cyan); border:none; border-radius:8px; font-weight:800;">AUTHENTICATE</button>
</div>

<div class="sidebar">
  <div class="brand-area">
    <h2>ORYX.OS</h2>
    <p>POWERED BY ARYAUX</p>
  </div>
  <a href="#" class="nav-link active">OVERVIEW</a>
  <a href="#" class="nav-link">LIVE QUEUE</a>
  <a href="#" class="nav-link">ANALYTICS</a>
  <a href="#" class="nav-link">SETTINGS</a>
</div>

<div class="dashboard-content">
  <div class="top-bar">
    <h3>GRANVILLE WAREHOUSE</h3>
    <div style="font-size: 12px; opacity:0.5;">LIVE SESSION · <span id="clock">--:--</span></div>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><h4>Requests Today</h4><div id="totalCount">0</div></div>
    <div class="stat-card"><h4>Revenue</h4><div id="revTotal">$0.00</div></div>
    <div class="stat-card"><h4>Priority Level</h4><div>87%</div></div>
  </div>

  <div class="panel-grid">
    <div class="section-panel">
      <div class="panel-title">PENDING REQUESTS</div>
      <div id="pendingList"></div>
    </div>

    <div class="section-panel">
      <div class="panel-title">LIVE QUEUE (APPROVED)</div>
      <div id="approvedList"></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyCRzE9DheGAxan7h2NLB14Va3hI4Pc5EKM",
  authDomain: "aryauxsongrequest.firebaseapp.com",
  databaseURL: "https://aryauxsongrequest-default-rtdb.firebaseio.com",
  projectId: "aryauxsongrequest",
  storageBucket: "aryauxsongrequest.firebasestorage.app",
  messagingSenderId: "376455919089",
  appId: "1:376455919089:web:4962df21f4145b61c30050"
});
const db = firebase.database();

function checkAuth() {
  if(document.getElementById('pass').value === '1234') {
    document.getElementById('loginPanel').style.display = 'none';
    loadDashboard();
  }
}

function loadDashboard() {
  db.ref('requests').on('value', snap => {
    const pendingList = document.getElementById('pendingList');
    const approvedList = document.getElementById('approvedList');
    pendingList.innerHTML = '';
    approvedList.innerHTML = '';

    let total = 0; let revenue = 0;

    snap.forEach(c => {
      const r = c.val();
      total++;
      if(r.lane === 'priority') revenue += 5.00;

      const item = document.createElement('div');
      item.className = 'request-item';
      const badge = r.lane === 'priority' ? '<span class="badge vip">VIP</span>' : '<span class="badge free">FREE</span>';
      
      item.innerHTML = `
        <div>
          <div style="font-size:13px; font-weight:600;">${r.song}</div>
          <div style="font-size:11px; opacity:0.5;">${r.artist} ${badge}</div>
        </div>
        <div class="action-btns">
          ${r.status === 'pending' ? `<button class="btn-approve" onclick="approve('${c.key}')">PLAY</button>` : ''}
          <button class="btn-deny" onclick="removeReq('${c.key}')">DEL</button>
        </div>
      `;

      if(r.status === 'pending') pendingList.appendChild(item);
      else approvedList.appendChild(item);
    });

    document.getElementById('totalCount').innerText = total;
    document.getElementById('revTotal').innerText = `$${revenue.toFixed(2)}`;
  });
}

function approve(id) { db.ref(`requests/${id}/status`).set('approved'); }
function removeReq(id) { db.ref(`requests/${id}`).remove(); }

setInterval(() => {
  const d = new Date();
  document.getElementById('clock').innerText = d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
}, 1000);
</script>
</body>
</html>
