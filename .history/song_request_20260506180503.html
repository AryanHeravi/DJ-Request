<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ORYX.OS | Request a Song</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg-dark: #050507;
  --neon-purple: #7a5cff;
  --neon-cyan: #00f0ff;
  --text-main: #ffffff;
  --glass: rgba(255, 255, 255, 0.05);
  --border: rgba(255, 255, 255, 0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Montserrat', sans-serif;
  background-color: var(--bg-dark);
  color: var(--text-main);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  overflow-x: hidden;
  padding-bottom: 40px;
}

/* Consistent Blurred Background */
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url('/photos/stux-live-concert-388160_1920.jpg');
  background-size: cover;
  background-position: center;
  filter: blur(8px) brightness(0.3);
  transform: scale(1.1);
  z-index: -1;
}

.container {
  width: 90%;
  max-width: 400px;
  padding-top: 30px;
}

/* Header Branding */
.branding {
  text-align: center;
  margin-bottom: 25px;
}

.branding h2 {
  font-weight: 800;
  letter-spacing: 4px;
  font-size: 24px;
}

.branding p {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--neon-purple);
  margin-top: 4px;
}

.section-title {
  text-transform: uppercase;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 15px;
  text-align: center;
}

/* Search Bar */
.search-container {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 15px;
  display: flex;
  align-items: center;
  margin-bottom: 20px;
  backdrop-filter: blur(10px);
}

.search-container input {
  background: transparent;
  border: none;
  color: white;
  width: 100%;
  outline: none;
  font-size: 14px;
}

/* Request List */
.song-list {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 16px;
  backdrop-filter: blur(10px);
  overflow: hidden;
  margin-bottom: 20px;
}

.song-item {
  display: flex;
  align-items: center;
  gap: 15px;
  padding: 12px 15px;
  border-bottom: 1px solid var(--border);
}

.song-info {
  flex-grow: 1;
}

.song-name {
  font-weight: 600;
  font-size: 14px;
}

.artist-name {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
}

.btn-add {
  background: rgba(0, 240, 255, 0.1);
  border: 1px solid var(--neon-cyan);
  color: var(--neon-cyan);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 18px;
  cursor: pointer;
  transition: 0.2s;
}

/* Priority Section */
.priority-banner {
  background: linear-gradient(135deg, rgba(122, 92, 255, 0.2), rgba(255, 47, 209, 0.2));
  border: 1px solid var(--neon-purple);
  border-radius: 16px;
  padding: 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  transition: 0.3s;
  backdrop-filter: blur(10px);
}

.priority-banner:hover {
  transform: translateY(-2px);
  filter: brightness(1.2);
}

.priority-text h4 {
  color: var(--neon-cyan);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.priority-text p {
  font-size: 10px;
  color: rgba(255,255,255,0.6);
}

.priority-price {
  font-weight: 800;
  font-size: 18px;
}

/* Modal Form Style */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 100;
  padding: 20px;
}

.request-modal {
  background: #0f0f17;
  border: 1px solid var(--neon-cyan);
  border-radius: 20px;
  width: 100%;
  max-width: 350px;
  padding: 25px;
}

.request-modal h3 { margin-bottom: 20px; text-align: center; }

input.modal-input {
  width: 100%;
  background: #07070a;
  border: 1px solid var(--border);
  color: white;
  padding: 14px;
  border-radius: 12px;
  margin-bottom: 12px;
  outline: none;
}

.btn-submit {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
  color: white;
  font-weight: 700;
  cursor: pointer;
  margin-top: 10px;
}

/* Back Button */
.back-btn {
  margin-top: 30px;
  background: transparent;
  color: rgba(255,255,255,0.4);
  border: none;
  font-size: 12px;
  cursor: pointer;
  text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">
  
  <div class="branding">
    <h2>ORYX.OS™</h2>
    <p>POWERED BY ARYAUX</p>
  </div>

  <h3 class="section-title">Request a Song</h3>

  <div class="search-container">
    <input type="text" placeholder="Search for a song or artist...">
  </div>

  <div class="song-list" id="queueDisplay">
    <div style="padding: 15px; font-size: 12px; text-align: center; color: rgba(255,255,255,0.3);">
      No songs currently in the live queue
    </div>
  </div>

  <div class="priority-banner" onclick="openRequestModal('priority')">
    <div class="priority-text">
      <h4>Skip the Line</h4>
      <p>Priority Request</p>
    </div>
    <div class="priority-price">$5 ></div>
  </div>

  <button class="back-btn" onclick="location.href='index.html'">← Back to Home</button>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="request-modal">
    <h3 id="modalTitle">Song Request</h3>
    <form id="requestForm">
      <input type="text" name="song" class="modal-input" placeholder="Song name" required>
      <input type="text" name="artist" class="modal-input" placeholder="Artist name" required>
      <input type="text" name="name" class="modal-input" placeholder="Your name (optional)">
      
      <div id="paymentChoice" style="display:none; margin-bottom: 15px;">
        <p style="font-size:12px; margin-bottom:8px; color: var(--neon-cyan);">Select Payment Method:</p>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <button type="button" class="btn-submit" style="background:#0070ba; font-size: 12px; margin: 0;" onclick="setPayment('paypal')">PayPal</button>
          <button type="button" class="btn-submit" style="background:#2ecc71; color: black; font-size: 12px; margin: 0;" onclick="setPayment('cash')">Cash</button>
        </div>
      </div>

      <input type="hidden" id="laneInput" name="lane" value="free">
      <input type="hidden" id="paymentInput" name="payment" value="free">
      <button type="submit" class="btn-submit" id="submitBtn">Submit Free Request</button>
      <button type="button" class="back-btn" style="width: 100%; text-align: center; color: white;" onclick="closeModal()">Cancel</button>
    </form>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyCRzE9DheGAxan7h2NLB14Va3hI4Pc5EKM",
  authDomain: "aryauxsongrequest.firebaseapp.com",
  databaseURL: "https://aryauxsongrequest-default-rtdb.firebaseio.com",
  projectId: "aryauxsongrequest",
  storageBucket: "aryauxsongrequest.firebasestorage.app",
  messagingSenderId: "376455919089",
  appId: "1:376455919089:web:4962df21f4145b61c30050"
});

const db = firebase.database();
const modal = document.getElementById('modalOverlay');
const laneInput = document.getElementById('laneInput');
const paymentInput = document.getElementById('paymentInput');
const paymentChoice = document.getElementById('paymentChoice');
const submitBtn = document.getElementById('submitBtn');

function openRequestModal(type) {
  modal.style.display = 'flex';
  if (type === 'priority') {
    laneInput.value = 'priority';
    paymentChoice.style.display = 'block';
    submitBtn.style.display = 'none';
    document.getElementById('modalTitle').innerText = 'Priority Request';
  } else {
    laneInput.value = 'free';
    paymentInput.value = 'free';
    paymentChoice.style.display = 'none';
    submitBtn.style.display = 'block';
    submitBtn.innerText = 'Submit Free Request';
    document.getElementById('modalTitle').innerText = 'Free Song Request';
  }
}

function setPayment(method) {
  paymentInput.value = method;
  submitBtn.style.display = 'block';
  submitBtn.innerText = `Pay $5 & Submit (${method})`;
}

function closeModal() {
  modal.style.display = 'none';
}

document.getElementById('requestForm').onsubmit = (e) => {
  e.preventDefault();
  const data = {
    song: e.target.song.value,
    artist: e.target.artist.value,
    name: e.target.name.value,
    lane: laneInput.value,
    payment: paymentInput.value,
    status: 'pending',
    timestamp: Date.now()
  };

  db.ref('requests').push(data).then(() => {
    alert("Request Sent!");
    if (paymentInput.value === 'paypal') {
      window.location.href = "https://paypal.me/aryaux";
    } else {
      location.reload();
    }
  });
};

// Render Approved Queue
db.ref('requests').on('value', snap => {
  const display = document.getElementById('queueDisplay');
  display.innerHTML = '<div style="padding:10px; font-size:11px; color:var(--neon-cyan); border-bottom: 1px solid var(--border); text-align:center;">LIVE QUEUE</div>';
  let count = 0;
  snap.forEach(c => {
    const r = c.val();
    if (r.status !== 'approved') return;
    count++;
    const div = document.createElement('div');
    div.className = 'song-item';
    div.innerHTML = `
      <div class="song-info">
        <div class="song-name">${r.song}</div>
        <div class="artist-name">${r.artist}</div>
      </div>
      <div style="font-size:10px; color:var(--neon-purple);">${r.lane === 'priority' ? 'VIP' : ''}</div>
    `;
    display.appendChild(div);
  });
  if(count === 0) display.innerHTML = '<div style="padding:20px; text-align:center; font-size:12px; opacity:0.3;">The queue is currently empty</div>';
});
</script>

</body>
</html>
