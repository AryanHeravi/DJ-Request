<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORYX.OS | Landing</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg-dark: #050507;
  --neon-purple: #7a5cff;
  --neon-cyan: #00f0ff;
  --text-main: #ffffff;
  --glass: rgba(255, 255, 255, 0.03);
  --border: rgba(255, 255, 255, 0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Montserrat', sans-serif;
  background-color: var(--bg-dark);
  color: var(--text-main);
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* BLURRED BACKGROUND IMAGE LAYER */
body::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  /* Using your uploaded concert image */
  background-image: url('stux-live-concert-388160_1920.jpg');
  background-size: cover;
  background-position: center;
  filter: blur(8px) brightness(0.4); /* 20% blur + dimmed for text readability */
  transform: scale(1.1); /* Prevents white edges caused by blur */
  z-index: -1;
}

/* OVERLAY GRADIENT for that ORYX look */
.overlay {
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(circle at 50% 40%, rgba(0, 240, 255, 0.05), transparent 50%),
    radial-gradient(circle at 50% 100%, rgba(122, 92, 255, 0.1), transparent 50%),
    linear-gradient(180deg, rgba(5, 5, 7, 0.6) 0%, #0c0c12 100%);
  z-index: 0;
}

.branding {
  text-align: center;
  margin-bottom: 20px;
  animation: fadeInDown 0.8s ease;
  z-index: 10;
}

.branding h2 {
  font-weight: 800;
  letter-spacing: 8px;
  font-size: 52px;
  line-height: 1;
  background: linear-gradient(to right, #fff, var(--neon-cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 5px;
}

.branding p {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 4px;
  color: var(--neon-purple);
  text-transform: uppercase;
}

.hero-card {
  width: 90%;
  max-width: 360px;
  text-align: center;
  z-index: 10;
  margin-top: 10px;
}

.main-title {
  font-size: 14px;
  font-weight: 400;
  letter-spacing: 2px;
  line-height: 1.6;
  margin-bottom: 30px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.7);
}

.main-title span {
  color: var(--neon-cyan);
  font-weight: 600;
}

.logo-container {
  position: relative;
  margin-bottom: 40px;
  display: inline-block;
}

.logo-glow {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 150px;
  height: 150px;
  background: var(--neon-cyan);
  filter: blur(60px);
  opacity: 0.2;
  z-index: -1;
}

.main-logo {
  width: 180px;
  height: auto;
  filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.btn-stack {
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: 100%;
}

.btn {
  padding: 18px;
  border-radius: 14px;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 1px;
  transition: 0.3s;
  border: none;
  cursor: pointer;
  text-transform: uppercase;
  backdrop-filter: blur(5px);
}

.btn-primary {
  background: rgba(0, 240, 255, 0.1);
  color: var(--neon-cyan);
  border: 1px solid var(--neon-cyan);
}

.btn-secondary {
  background: rgba(122, 92, 255, 0.1);
  border: 1px solid var(--neon-purple);
  color: var(--neon-purple);
}

.btn:hover {
  transform: scale(1.02);
  filter: brightness(1.3);
  box-shadow: 0 0 25px rgba(0, 240, 255, 0.2);
}

.footer-info {
  position: absolute;
  bottom: 30px;
  font-size: 10px;
  color: rgba(255, 255, 255, 0.5);
  display: flex;
  gap: 20px;
  letter-spacing: 1px;
  z-index: 10;
}

@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

  <div class="overlay"></div>

  <div class="branding">
    <h2>ORYX.OS™</h2>
    <p>POWERED BY ARYAUX</p>
  </div>

  <div class="hero-card">
    <h1 class="main-title">GRANVILLE WAREHOUSE<br>REQUEST <span>YOUR</span> MUSIC.</h1>

    <div class="logo-container">
      <div class="logo-glow"></div>
      <img src="wg-1logo.png" class="main-logo" alt="Granville Warehouse Logo">
    </div>

    <div class="btn-stack">
      <button class="btn btn-primary" onclick="location.href='song_request.html'">Request a Song</button>
      <button class="btn btn-secondary" onclick="location.href='song_request.html#queue'">View Live Queue</button>
    </div>
  </div>

  <div class="footer-info">
    <span>🔒 SECURE</span>
    <span>⚡ FAST</span>
    <span>✨ SEAMLESS</span>
  </div>

</body>
</html>
