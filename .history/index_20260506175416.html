<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORYX.OS | Landing</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg-dark: #050507;
  --neon-purple: #7a5cff;
  --neon-cyan: #00f0ff;
  --text-main: #ffffff;
  --glass: rgba(255, 255, 255, 0.03);
  --border: rgba(255, 255, 255, 0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Montserrat', sans-serif;
  background-color: var(--bg-dark);
  color: var(--text-main);
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  /* Deep atmospheric glow to match the reference UI */
  background: 
    radial-gradient(circle at 50% 40%, rgba(0, 240, 255, 0.07), transparent 50%),
    radial-gradient(circle at 50% 100%, rgba(122, 92, 255, 0.15), transparent 50%),
    linear-gradient(180deg, #050507 0%, #0c0c12 100%);
}

/* BRANDING ENHANCEMENTS: Overtakes other text as requested */
.branding {
  text-align: center;
  margin-bottom: 20px;
  animation: fadeInDown 0.8s ease;
}

.branding h2 {
  font-weight: 800;
  letter-spacing: 8px;
  font-size: 52px; /* Massive scale */
  line-height: 1;
  background: linear-gradient(to right, #fff, var(--neon-cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 5px;
}

.branding p {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 4px;
  color: var(--neon-purple);
  text-transform: uppercase;
}

.hero-card {
  width: 90%;
  max-width: 360px;
  text-align: center;
  z-index: 10;
  margin-top: 10px;
}

/* SCALED DOWN SUB-TITLE */
.main-title {
  font-size: 14px;
  font-weight: 400;
  letter-spacing: 2px;
  line-height: 1.6;
  margin-bottom: 30px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
}

.main-title span {
  color: var(--neon-cyan);
  font-weight: 600;
}

/* LOGO SECTION WITH GLOW */
.logo-container {
  position: relative;
  margin-bottom: 40px;
  display: inline-block;
}

.logo-glow {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 150px;
  height: 150px;
  background: var(--neon-cyan);
  filter: blur(60px);
  opacity: 0.15;
  z-index: -1;
}

.main-logo {
  width: 180px;
  height: auto;
  filter: drop-shadow(0 0 20px rgba(255,255,255,0.1));
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* ACTION BUTTONS */
.btn-stack {
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: 100%;
}

.btn {
  padding: 18px;
  border-radius: 14px;
  font-weight: 700;
  text-decoration: none;
  font-size: 13px;
  letter-spacing: 1px;
  transition: 0.3s;
  border: none;
  cursor: pointer;
  text-transform: uppercase;
}

.btn-primary {
  background: transparent;
  color: var(--neon-cyan);
  border: 1px solid var(--neon-cyan);
  box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.1);
}

.btn-secondary {
  background: transparent;
  border: 1px solid var(--neon-purple);
  color: var(--neon-purple);
}

.btn:hover {
  transform: scale(1.02);
  filter: brightness(1.2);
  box-shadow: 0 0 25px rgba(0, 240, 255, 0.2);
}

.footer-info {
  position: absolute;
  bottom: 30px;
  font-size: 10px;
  color: rgba(255, 255, 255, 0.3);
  display: flex;
  gap: 20px;
  letter-spacing: 1px;
}

@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

  <div class="branding">
    <h2>ORYX.OS™</h2>
    <p>POWERED BY ARYAUX</p>
  </div>

  <div class="hero-card">
    <h1 class="main-title">GRANVILLE WAREHOUSE<br>REQUEST <span>YOUR</span> MUSIC.</h1>

    <div class="logo-container">
      <div class="logo-glow"></div>
      <img src="wg-1logo.png" class="main-logo" alt="Granville Warehouse Logo">
    </div>

    <div class="btn-stack">
      <button class="btn btn-primary" onclick="location.href='song_request.html'">Request a Song</button>
      <button class="btn btn-secondary" onclick="location.href='song_request.html#queue'">View Live Queue</button>
    </div>
  </div>

  <div class="footer-info">
    <span>🔒 SECURE</span>
    <span>⚡ FAST</span>
    <span>✨ SEAMLESS</span>
  </div>

</body>
</html>
