<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ORYX.OS | DJ Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg-dark: #050507;
  --panel-bg: #0c0c12;
  --neon-cyan: #00f0ff;
  --neon-purple: #7a5cff;
  --border: rgba(255, 255, 255, 0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Montserrat', sans-serif;
  background-color: var(--bg-dark);
  color: white;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* SIDEBAR NAVIGATION */
.sidebar {
  width: 240px;
  background: var(--panel-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 30px 20px;
  flex-shrink: 0;
}

.brand-area { margin-bottom: 40px; }
.brand-area h2 { font-size: 18px; letter-spacing: 4px; font-weight: 800; }
.brand-area p { font-size: 8px; color: var(--neon-cyan); letter-spacing: 1px; text-transform: uppercase; }

.nav-group { display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }

.nav-link {
  color: rgba(255,255,255,0.4);
  text-decoration: none;
  font-size: 11px;
  font-weight: 700;
  padding: 12px 15px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: 0.3s;
  cursor: pointer;
  letter-spacing: 1px;
}

.nav-link:hover { background: rgba(255,255,255,0.03); color: white; }
.nav-link.active { background: rgba(0, 240, 255, 0.05); color: var(--neon-cyan); }

/* CONTENT AREA */
.main-dashboard {
  flex-grow: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.view-section {
  display: none; /* Hidden by default, toggled by JS */
  padding: 40px;
  height: 100%;
  overflow-y: auto;
}

.view-section.active { display: block; }

/* AUTH OVERLAY */
#loginPanel {
  position: fixed; inset: 0; background: var(--bg-dark);
  display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
}
#loginPanel input { padding: 15px; border-radius: 12px; background: #111; border: 1px solid var(--border); color: white; margin-bottom: 10px; width: 280px; outline: none; }
#loginPanel button { padding: 15px 30px; background: var(--neon-cyan); border: none; border-radius: 12px; font-weight: 800; cursor: pointer; color: black; }

/* REUSE YOUR EXISTING REQUEST STYLES */
.lane { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
.request { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border: 1px solid var(--border); }
.request.priority { border: 1px solid #ffd166; }
.btn-approve { background: var(--neon-cyan); color: black; padding: 8px 15px; border-radius: 6px; border: none; font-weight: 800; cursor: pointer; }
.btn-deny { background: transparent; color: rgba(255,255,255,0.3); border: 1px solid var(--border); padding: 8px 15px; border-radius: 6px; cursor: pointer; }
</style>
</head>

<body>

<div id="loginPanel">
  <div class="brand-area" style="text-align: center;">
    <h2>ORYX.OS</h2>
    <p>Authentication Required</p>
  </div>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button id="loginBtn">LOG IN</button>
</div>

<nav class="sidebar">
  <div class="brand-area">
    <h2>ORYX.OS™</h2>
    <p>Powered by Aryaux</p>
  </div>

  <div class="nav-group">
    <div class="nav-link active" onclick="showView('overview')"><span>🏠</span> OVERVIEW</div>
    <div class="nav-link" onclick="showView('requests')"><span>📥</span> REQUESTS</div>
    <div class="nav-link" onclick="showView('queue')"><span>📊</span> LIVE QUEUE</div>
    <div class="nav-link" onclick="showView('analytics')"><span>📈</span> ANALYTICS</div>
    <div class="nav-link" onclick="showView('locations')"><span>📍</span> LOCATIONS</div>
    <div class="nav-link" onclick="showView('settings')"><span>⚙️</span> SETTINGS</div>
    <div class="nav-link" onclick="showView('help')"><span>❓</span> HELP</div>
  </div>
</nav>

<main class="main-dashboard">
  <section id="overview" class="view-section active">
    <h1>System Overview</h1>
    <p style="opacity: 0.5;">Select a tab from the sidebar to manage the experience.</p>
  </section>

  <section id="requests" class="view-section">
    <h1>Pending Requests</h1>
    <div style="margin: 20px 0; display: flex; gap: 10px;">
        <button onclick="clearLane('free')" style="padding:10px; border-radius:8px; background:rgba(255,255,255,0.05); color:white; border:1px solid var(--border);">Clear Free</button>
        <button onclick="clearAll()" style="padding:10px; border-radius:8px; background:rgba(255,0,0,0.1); color:red; border:1px solid rgba(255,0,0,0.2);">Clear All</button>
    </div>
    <div id="freeLane"></div>
    <div id="priorityLane"></div>
  </section>

  <section id="queue" class="view-section"><h1>Live Queue</h1></section>
  <section id="analytics" class="view-section"><h1>Analytics</h1></section>
  <section id="locations" class="view-section"><h1>Locations</h1></section>
  <section id="settings" class="view-section"><h1>Settings</h1></section>
  <section id="help" class="view-section"><h1>Help</h1></section>
</main>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// Your Firebase Config
firebase.initializeApp({
  apiKey: "AIzaSyCRzE9DheGAxan7h2NLB14Va3hI4Pc5EKM",
  authDomain: "aryauxsongrequest.firebaseapp.com",
  databaseURL: "https://aryauxsongrequest-default-rtdb.firebaseio.com",
  projectId: "aryauxsongrequest",
  storageBucket: "aryauxsongrequest.appspot.com",
  messagingSenderId: "376455919089",
  appId: "1:376455919089:web:4962df21f4145b61c30050"
});

const db = firebase.database();
const auth = firebase.auth();

// VIEW NAVIGATION
function showView(viewId) {
  document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
  
  document.getElementById(viewId).classList.add('active');
  event.currentTarget.classList.add('active');
}

// LOGIN
document.getElementById('loginBtn').addEventListener('click', () => {
  auth.signInWithEmailAndPassword(email.value, password.value).catch(() => alert("Failed"));
});

auth.onAuthStateChanged(user => {
  if(user){
    document.getElementById('loginPanel').style.display="none";
    loadRequests();
  } else {
    document.getElementById('loginPanel').style.display="flex";
  }
});

// LOAD REQUESTS
function loadRequests(){
  db.ref("requests").on("value", snap=>{
    const free = document.getElementById('freeLane');
    const priority = document.getElementById('priorityLane');
    free.innerHTML=""; priority.innerHTML="";
    
    snap.forEach(c=>{
      const r=c.val();
      if(r.status==="approved") return;
      const div=document.createElement("div");
      div.className="request"+(r.lane==="priority"?" priority":"");
      div.innerHTML=`
        <div><strong>${r.song}</strong> – ${r.artist}</div>
        <div style="display:flex; gap:10px;">
          <button class="btn-approve" onclick="approve('${c.key}')">APPROVE</button>
          <button class="btn-deny" onclick="removeReq('${c.key}')">DENY</button>
        </div>`;
      (r.lane==="priority"?priority:free).appendChild(div);
    });
  });
}

function approve(id){ db.ref(`requests/${id}/status`).set("approved"); }
function removeReq(id){ db.ref(`requests/${id}`).remove(); }
function clearAll(){ if(confirm("Clear all?")) db.ref("requests").remove(); }
</script>

</body>
</html>
